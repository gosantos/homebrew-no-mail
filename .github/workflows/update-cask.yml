name: update-cask

on:
  workflow_dispatch:
    inputs:
      version:
        description: "noMail version (e.g. 1.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: download release zip and checksum
        id: hash
        run: |
          version="${{ inputs.version }}"
          curl -sSL -o /tmp/noMail.zip \
            "https://github.com/gosantos/no-mail/releases/download/v${version}/noMail-${version}.zip"
          echo "sha=$(shasum -a 256 /tmp/noMail.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: update cask
        run: |
          version="${{ inputs.version }}"
          sed -i '' "s/version \".*\"/version \"$version\"/" Casks/no-mail.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${{ steps.hash.outputs.sha }}\"/" Casks/no-mail.rb

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/no-mail.rb
          git commit -m "bump to v${{ inputs.version }}" || echo "no changes"
          git push origin main
